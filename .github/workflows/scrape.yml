name: daily-scrape

# Scrapes HOURLY. The ATS boards + The Muse run every hour; the rate-sensitive
# sources (Adzuna/Remotive/RemoteOK) run only 4x/day (main.py courtesy gate).
# Needs unlimited Actions minutes -> the repo is public. workflow_dispatch +
# repository_dispatch (the in-app Refresh button) trigger an extra run anytime.
on:
  schedule:
    - cron: "0 * * * *" # hourly, top of the hour (UTC)
  workflow_dispatch: {}
  repository_dispatch:
    types: [manual-scrape]

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Determine trigger
        id: trig
        run: |
          case "${{ github.event_name }}" in
            repository_dispatch) echo "trigger=manual"   >> "$GITHUB_OUTPUT" ;;
            workflow_dispatch)   echo "trigger=dispatch" >> "$GITHUB_OUTPUT" ;;
            *)                   echo "trigger=cron"     >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_LLM_RATIONALE: ${{ vars.USE_LLM_RATIONALE }}
          SCRAPE_TRIGGER: ${{ steps.trig.outputs.trigger }}
        run: python -m scraper.main
